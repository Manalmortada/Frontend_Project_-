<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <title>feedback</title>
        <link rel="stylesheet" href="css/bootstrap.css">
    </head>
    <body>
        <div style="text-align: center;background-color: rgb(57, 151, 206);color: white;font-size: 28px;width: 300px;justify-self: center;margin-top: 10px ;">استطلاع رأى</div>
        <br>
        <form lang="ar" dir="rtl">
            <div class="container w-50 mt-5">
                <div class="form-group">
                    <p style="justify-self: start; font-size: 18px;">الاسم:</p>
                    <input class="form-control" type="name" placeholder="اكتب هنا">
                    <br>
                </div>
                <div class="form-group">
                    <p style="justify-self: start; font-size: 18px;">الايميل:</p>
                    <input class="form-control" type="email" placeholder="اكتب هنا">
                    <br>
                </div>
                <div class="form-group">
                    <p style="justify-self: start; font-size: 18px;">اخبار عن:</p>
                    <select class="form-control" style="width: 100px;">
                        <option>سياسة</option>
                        <option>اقتصاد</option>
                    </select>
                </div>
                <p style="justify-self: start; font-size: 18px;">اكتب رأيك:</p>
                <textarea rows="5" cols="60" placeholder="اكتب هنا....." style="margin-left: 450px;"></textarea>
            </div><br><br><br><br>
            <button type="submit" class="btn btn-info" style="margin-left: 730px;width: 100px;">تأكيد</button>
            <br><br><br><br><br><br>
        </form>
    </body>
</html>
