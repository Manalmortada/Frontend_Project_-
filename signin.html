<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <title>sign in</title>
        <link rel="stylesheet" href="css/bootstrap.css">
    </head>
    <body>
        <div style="text-align: center;background-color: rgb(57, 151, 206);color: white;font-size: 28px;width: 300px;justify-self: center;margin-top: 10px ;">تسجيل الدخول</div>
        <br><br><br>
        <form lang="ar" dir="rtl">
            <div class="container w-50 mt-5">
                <div class="form-group">
                    <p style="justify-self: start; font-size: 18px;">الايميل:</p>
                    <input class="form-control" type="email" placeholder="اكتب هنا">
                    <br><br><br>
                </div>
                <div class="form-group">
                    <p style="justify-self: start; font-size: 18px;">كلمة السر:</p>
                    <input class="form-control" type="password" placeholder="اكتب هنا">
                    <br><br><br>
                </div>
            </div><br><br><br>
            <button type="button" class="btn btn-info" style="margin-left: 600px;">تسجيل الدخول</button>
            <br><br><br><br>
        </form>
    </body>
</html>
