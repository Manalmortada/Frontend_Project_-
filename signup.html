<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <title>sign up</title>
        <link rel="stylesheet" href="css/bootstrap.css">
    </head>
    <body>
        <div style="text-align: center;background-color: rgb(57, 151, 206);color: white;font-size: 28px;width: 300px;justify-self: center;margin-top: 10px ;">انشاء حساب</div>
        <br>
        <form lang="ar" dir="rtl">
            <div class="container w-50 mt-5">
                <div class="form-group">
                    <p style="justify-self: start; font-size: 18px;">الاسم الاول:</p>
                    <input class="form-control" type="text" placeholder="اكتب هنا">
                    <br>
                </div>
                <div class="form-group">
                    <p style="justify-self: start; font-size: 18px;">الاسم الاخير:</p>
                    <input class="form-control" type="text" placeholder="اكتب هنا">
                    <br>
                </div>
                <div class="form-group">
                    <p style="justify-self: start; font-size: 18px;">تاريخ الميلاد</p>
                    <input class="form-control" type="date" placeholder=" / / ">
                    <br>
                </div>
                <div class="form-group">
                    <p style="justify-self: start; font-size: 18px;">الايميل:</p>
                    <input class="form-control" type="email" placeholder="اكتب هنا">
                    <br>
                </div>
                <div class="form-group">
                    <p style="justify-self: start; font-size: 18px;">كلمة السر:</p>
                    <input class="form-control" type="password" placeholder="اكتب هنا">
                </div><br>
                <p style="justify-self: start; font-size: 18px;">الجنس:</p>
                <div class="form-check" style="justify-self: start;">
                    <input  class="form-check-radio" type="radio" name="gender" value="ذكر">
                    <label class="form-check-label">ذكر</label>
                </div>
                <div class="form-check" style="justify-self: start;">
                    <input  class="form-check-radio" type="radio" name="gender" value="انثى">
                    <label class="form-check-label">انثى</label>
                </div>
            </div><br><br><br><br><br>
            <button type="button" class="btn btn-info" style="margin-left: 600px;">انشاء حساب</button>
            <br><br><br><br>
        </form>
    </body>
</html>
